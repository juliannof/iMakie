  
[env:lolin_s2_mini_ota]
;platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
board = lolin_s2_mini
framework = arduino

upload_protocol = custom
upload_port     = ota_target

extra_scripts   = post:upload_ota.py
                  pre:pre_build.py  
upload_flags    =
    --auth=9821

monitor_port    = /dev/cu.usbmodem01
monitor_speed   = 115200


board_build.arduino.memory_type = qio_qspi
board_build.partitions = partitions_4MB_ota.csv

build_flags =
    -I src
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=0
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MSC_ON_BOOT=0
    -DARDUINO_USB_DFU_ON_BOOT=0
    -DCONFIG_ESP32_RMT_MEM_BLOCKS=4
    -DCONFIG_ESP_TASK_WDT_TIMEOUT_S=60
    -mfix-esp32-psram-cache-issue
    -Wno-cpp
    -Wno-deprecated-declarations
    -Wno-attributes
    -DCORE_DEBUG_LEVEL=3

lib_deps =
    adafruit/Adafruit NeoPixel
    lovyan03/LovyanGFX@^1.2.19
    lennarthennigs/Button2@^2.5.0
    tzapu/WiFiManager @ ^2.0.17
    ayushsharma82/ElegantOTA@^3.1.7

[env:lolin_s2_mini_serial]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
board = lolin_s2_mini
framework = arduino

upload_protocol = esptool
upload_port     = /dev/cu.usbmodem01
upload_speed    = 460800

extra_scripts   = pre:pre_build.py

monitor_port    = /dev/cu.usbmodem01
monitor_speed   = 115200

board_build.arduino.memory_type = qio_qspi
board_build.partitions = partitions_4MB_ota.csv

build_flags =
    -I src
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=0
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MSC_ON_BOOT=0
    -DARDUINO_USB_DFU_ON_BOOT=0
    -DCONFIG_ESP32_RMT_MEM_BLOCKS=4
    -DCONFIG_ESP_TASK_WDT_TIMEOUT_S=60
    -mfix-esp32-psram-cache-issue
    -Wno-cpp
    -Wno-deprecated-declarations
    -Wno-attributes
    -DCORE_DEBUG_LEVEL=3

lib_deps =
    adafruit/Adafruit NeoPixel
    lovyan03/LovyanGFX@^1.2.19
    lennarthennigs/Button2@^2.5.0
    tzapu/WiFiManager @ ^2.0.17
    ayushsharma82/ElegantOTA@^3.1.7
